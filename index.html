<!DOCTYPE html>
<!--
    =====================================================================
    index.html — 댕다방 인트로 페이지 (랜딩)
    ---------------------------------------------------------------------
    사용자가 처음 접속하는 페이지. 영상 스플래시 후 오로라 글래스 인트로 노출.

    구조:
      1. 좌상단 시그니처 로고 (큰 60px 원형 + 2.8rem 댕다방 텍스트)
      2. 비디오 스플래시 (#video-splash) — 영상 자동재생, 좌우 검정 띠를
         가리는 크림 오버레이(.video-bar) 포함. 클릭 또는 영상 종료 시 스킵.
      3. 메인 인트로 섹션 (#intro-main) — 오로라 글래스 톤
         (회전 블롭 + 글래스 카드 3개 + CTA "쇼핑 시작하기")
         → "쇼핑 시작하기" 또는 "SKIP TO STORE" 클릭 시 main.html 로 이동.

    의존 파일:
      assets/css/intro.css
      assets/js/intro.js
      assets/images/logo.png
      assets/videos/intro.mp4
    =====================================================================
-->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>댕다방 - 우리 댕댕이를 위한 모든 것</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/intro.css">
</head>
<body>
    <!-- 좌측 상단 로고 -->
    <div class="fixed top-8 left-10 z-50 flex items-center gap-[6px] pointer-events-none">
        <div class="logo-magic-wrapper">
            <img src="assets/images/logo.png" alt="댕다방 로고">
        </div>
        <div class="crayon-text">
            <span class="char-1">댕</span><span class="char-2">다</span><span class="char-3">방</span>
        </div>
    </div>

    <!-- 비디오 스플래시 -->
    <div id="video-splash" onclick="skipVideo()">
        <video id="splash-video" autoplay muted playsinline></video>
        <div class="video-bar left"></div>
        <div class="video-bar right"></div>
        <div class="skip-text">화면을 클릭하면 건너뜁니다 <i class="fa-solid fa-angles-right ml-1"></i></div>
    </div>

    <!-- 오로라 글래스 메인 인트로 -->
    <section id="intro-main" class="intro-section px-6 relative">
        <div class="aurora-bg">
            <div class="blob1"></div>
            <div class="blob2"></div>
        </div>

        <div class="max-w-6xl w-full text-center z-10 pt-16">
            <p class="text-sm font-bold tracking-widest text-blue-600 mb-4">WELCOME TO DAENGDABANG</p>
            <h2 class="text-6xl font-black mb-6 leading-tight">
                우리 댕댕이를 위한<br>
                <span class="text-blue-600">특별한 발견</span>
            </h2>
            <p class="text-lg text-slate-600 mb-12 max-w-2xl mx-auto">
                사료부터 장난감, 의류까지 — 큐레이티드 컬렉션으로<br>
                매일이 더 즐거운 댕댕이의 라이프스타일을 완성하세요.
            </p>

            <div class="grid grid-cols-3 gap-8 mb-12">
                <div class="glass-box p-10">
                    <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fa-solid fa-bone text-2xl text-slate-600"></i>
                    </div>
                    <h3 class="font-bold text-lg mb-1">사료 &amp; 간식</h3>
                    <p class="text-sm text-slate-500">엄선된 프리미엄 푸드</p>
                </div>
                <div class="glass-box p-10">
                    <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fa-solid fa-baseball text-2xl text-white"></i>
                    </div>
                    <h3 class="font-bold text-lg mb-1">장난감 &amp; 용품</h3>
                    <p class="text-sm text-slate-500">매일이 즐거운 놀이 아이템</p>
                </div>
                <div class="glass-box p-10">
                    <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fa-solid fa-shirt text-2xl text-pink-500"></i>
                    </div>
                    <h3 class="font-bold text-lg mb-1">의류 &amp; 액세서리</h3>
                    <p class="text-sm text-slate-500">사랑스러운 패션 큐레이션</p>
                </div>
            </div>

            <a href="main.html" class="bg-slate-900 text-white px-12 py-4 rounded-full font-bold mb-4 hover:bg-slate-800 transition inline-block no-underline">
                쇼핑 시작하기
            </a><br>
            <a href="main.html" class="cyber-skip-btn">
                <span>SKIP TO STORE</span>
                <div class="cyber-arrow"><i class="fa-solid fa-angle-right"></i></div>
            </a>
        </div>
    </section>

    <script src="assets/js/intro.js"></script>
</body>
</html>
