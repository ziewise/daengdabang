<!DOCTYPE html>
<!--
    =====================================================================
    forgot-password.html — 비밀번호 찾기 페이지
    ---------------------------------------------------------------------
    이메일 입력 → 재설정 링크 발송 (임시: 안내 메시지만)

    임시(Mock) 동작:
      - 이메일 비워도 "발송" 클릭 시 안내 화면으로 전환
      - 백엔드 연동 시 실제 이메일 발송 API 호출

    의존: common.css + auth.css + auth.js
    =====================================================================
-->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 찾기 - 댕다방</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/common.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>
    <div class="global-aurora"></div>

    <div class="auth-page">

        <!-- 상단 로고 -->
        <a href="main.html" class="brand-logo auth-header">
            <div class="brand-logo-circle"><img src="assets/images/logo.png" alt="댕다방"></div>
            <div class="brand-logo-text">
                <span class="char-1">댕</span><span class="char-2">다</span><span class="char-3">방</span>
            </div>
        </a>

        <!-- 비밀번호 찾기 카드 -->
        <div class="auth-card" id="forgot-card">

            <!-- ─── 1단계: 이메일 입력 ─── -->
            <div id="forgot-form-step">
                <h1 class="auth-title">비밀번호 찾기</h1>
                <p class="auth-sub">가입하신 이메일을 입력하시면 비밀번호 재설정 링크를 보내드려요.</p>

                <form class="auth-form" id="forgot-form">
                    <div class="auth-field">
                        <label class="auth-label" for="forgot-email">이메일</label>
                        <input class="auth-input" id="forgot-email" type="email" placeholder="email@example.com" autocomplete="email">
                    </div>

                    <button type="submit" class="btn-primary-full">재설정 링크 보내기</button>
                </form>

                <div class="auth-info-box mock" style="margin-top: 14px;">
                    <strong>임시 모드</strong> — 이메일 비워도 다음 화면으로 넘어갑니다.
                </div>

                <div class="auth-footer-links">
                    <a href="login.html">로그인</a>
                    <span class="sep">·</span>
                    <a href="signup.html" class="bold">회원가입</a>
                </div>
            </div>

            <!-- ─── 2단계: 발송 완료 안내 ─── -->
            <div id="forgot-sent-step" style="display: none;">
                <div class="welcome-icon" style="background: linear-gradient(135deg, #06b6d4, #6366f1);">
                    <i class="fa-solid fa-envelope-open-text"></i>
                </div>
                <h1 class="welcome-title">이메일을 확인해주세요</h1>
                <p class="welcome-sub">
                    입력하신 이메일로 비밀번호 재설정 링크를<br>
                    발송했어요. 이메일을 열어 안내에 따라주세요.
                </p>

                <div class="auth-info-box" style="margin-bottom: 20px;">
                    <strong>이메일이 안 보이나요?</strong><br>
                    스팸함을 확인하거나 5분 후 다시 시도해주세요.
                </div>

                <a href="login.html" class="btn-primary-full" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">
                    로그인 페이지로 돌아가기
                </a>

                <div class="auth-footer-links">
                    <button type="button" id="btn-resend" style="background: none; border: none; color: #2563eb; font-weight: 700; cursor: pointer; font-family: inherit; font-size: 13px;">
                        이메일이 안 보이면 다시 보내기
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script src="assets/js/auth.js"></script>
</body>
</html>
