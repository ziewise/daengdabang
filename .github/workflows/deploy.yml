#
# GitHub Pages 자동 배포 워크플로우 (Next.js 정적 export)
# ---------------------------------------------------------------------
# main 브랜치 push 시 자동 빌드 -> GitHub Pages 로 배포.
# Settings -> Pages -> Source 를 "GitHub Actions" 로 설정해야 동작.
#
# next.config.ts 의 output: 'export' 가 켜져 있어야 out/ 산출됨.
# public/CNAME 에 도메인이 적혀 있으면 빌드 시 out/CNAME 으로 복사되어
# GitHub Pages 가 Custom domain 으로 인식.
#

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_STOREFRONT_ASSET_COMMIT_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Verify pet companion frame quality
        run: |
          python -m pip install Pillow==12.2.0
          python tools/verify_pet_companion_breed_atlases.py

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Prepare Pages artifact
        run: node scripts/prepare-pages-artifact.mjs --out out --max-bytes 950000000

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
